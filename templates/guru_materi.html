<!DOCTYPE html>
<html lang="id">
<head>
    <title>Kelola Materi - LMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar nav-success">
        <div class="navbar-brand">Manajemen Materi Kuliah</div>
        <a href="/guru_hub" class="btn btn-outline btn-sm">Kembali ke Hub Guru</a>
    </nav>
    <div class="container mt-4">
        
        <div class="card">
            <div class="card-header header-success">Upload Dokumen Baru (.PDF)</div>
            <div class="card-body">
                <form method="POST" enctype="multipart/form-data">
                    <div class="grid-3">
                        <div class="form-group">
                            <label class="form-label">Judul Dokumen</label>
                            <input type="text" class="form-control" name="judul" required placeholder="Contoh: Modul 1 Linux">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Mata Pelajaran</label>
                            <input type="text" class="form-control" name="mapel" required placeholder="Misal: Jaringan Komputer">
                        </div>
                        <div class="form-group">
                            <label class="form-label" style="color: var(--danger);">Target Kelas (Isolasi)</label>
                            <select class="form-control" name="kelas_target" style="border: 2px solid var(--danger);">
                                <option value="Semua Kelas">Semua Kelas</option>
                                <option value="TKJ 1">TKJ 1</option>
                                <option value="TKJ 2">TKJ 2</option>
                                <option value="TKRO 1">TKRO 1</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group mt-3">
                        <label class="form-label">Pilih File PDF</label>
                        <input type="file" class="form-control" name="file_materi" accept=".pdf" required>
                    </div>
                    <button type="submit" class="btn btn-success btn-block mt-4">Upload & Bagikan ke Murid</button>
                </form>
            </div>
        </div>

        <h3 class="mb-4 mt-5">Riwayat Materi Tersimpan</h3>
        <div class="card table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Mata Pelajaran</th>
                        <th>Judul Materi</th>
                        <th>Target Kelas</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody>
                    {% for m in riwayat %}
                    <tr>
                        <td><span class="badge badge-secondary">{{ m[0] }}</span></td>
                        <td><strong>{{ m[1] }}</strong></td>
                        <td><span class="badge badge-info">{{ m[2] }}</span></td>
                        <td><a href="/download/{{ m[3] }}" class="btn btn-outline-danger btn-sm">Lihat PDF</a></td>
                    </tr>
                    {% else %}
                    <tr><td colspan="4" class="text-center">Belum ada materi yang diupload.</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

    </div>
</body>
</html>
