<!DOCTYPE html>
<html lang="id">
<head>
    <title>Dashboard Siswa</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="lms-layout">
        <aside class="lms-sidebar">
            <h3 class="text-center mb-4">LMS Vatchoel</h3>
            <div class="sidebar-menu">
                <a href="/murid_hub" class="nav-link active">Dashboard</a>
                <a href="/murid_ujian" class="nav-link">Ruang Ujian</a>
            </div>
            <div style="margin-top: auto;">
                <hr>
                <a href="/logout" class="btn btn-outline-danger btn-block">Keluar</a>
            </div>
        </aside>

        <main class="lms-content">
            <h2 class="mb-4">Halo, {{ session['username'] }}!</h2>
            <div class="grid-3">
                {% for m in daftar_matkul %}
                <a href="/murid_matkul/{{ m[0] }}">
                    <div class="matkul-card">
                        <div class="matkul-header"></div>
                        <div class="card-body">
                            <h3>{{ m[0] }}</h3>
                            <p>Modul Tersedia ✓</p>
                        </div>
                    </div>
                </a>
                {% else %}
                <div class="alert alert-secondary text-center" style="grid-column: 1 / -1;">
                    <h4>Belum ada Mata Pelajaran</h4>
                    <p>Guru belum mengupload materi apapun untuk kelas <strong>{{ session['kelas'] }}</strong>.</p>
                </div>
                {% endfor %}
            </div>
        </main>
    </div>
</body>
</html>
