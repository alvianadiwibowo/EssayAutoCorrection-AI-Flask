<!DOCTYPE html>
<html lang="id">
<head>
    <title>Login - Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .login-page { display: flex; align-items: center; justify-content: center; height: 100vh; background-color: var(--dark); }
        .login-box { width: 350px; }
    </style>
</head>
<body class="login-page">
    <div class="card login-box">
        <div class="card-body">
            <h3 class="text-center mb-4">Login Portal</h3>
            {% if error %} <div class="alert alert-danger">{{ error }}</div> {% endif %}
            <form method="POST">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-control" name="username" required placeholder="Masukkan username">
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" name="password" required placeholder="Masukkan password">
                </div>
                <button type="submit" class="btn btn-primary btn-block">Masuk</button>
            </form>
        </div>
    </div>
</body>
</html>
